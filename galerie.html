        * {

        nav {

            nav a {

                text-decoration: none;
                font-size: 16px;
                font-weight: 600;
                letter-spacing: 1px;
                text-transform: uppercase;
                transition: color 0.3s;
            }

                nav a:hover {
                    color: #a8d8ea;
                }

                nav a.active {
                    border-bottom: 2px solid #a8d8ea;
                    padding-bottom: 4px;
                }

        .page-hero {
            height: 40vh;
            background-image: url('Medien/Sunset.jpeg');
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

            .page-hero::after {
                content: '';
                position: absolute;
                inset: 0;
                background: rgba(0,0,0,0.5);
            }

            .page-hero h1 {
                position: relative;
                z-index: 2;
                color: white;
                font-size: 52px;
                letter-spacing: 4px;
                text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            }

        .content {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 40px;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .filter-btn {
            padding: 10px 24px;
            border: 2px solid #2c6e8a;
            border-radius: 50px;
            background: transparent;
            color: #2c6e8a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

            .filter-btn:hover,
            .filter-btn.active {
                background: #2c6e8a;
                color: white;
            }

        .gallery-grid {
            columns: 4;
            column-gap: 16px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

            .gallery-item img,
            .gallery-item video {
                width: 100%;
                display: block;
                transition: transform 0.4s;
            }

            .gallery-item:hover img,
            .gallery-item:hover video {
                transform: scale(1.05);
            }

            .gallery-item .overlay {
                position: absolute;
                inset: 0;
                background: rgba(44, 110, 138, 0.7);
                opacity: 0;
                transition: opacity 0.3s;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 32px;
            }

            .gallery-item:hover .overlay {
                opacity: 1;
            }

        /* VIDEO BADGE */
        .video-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 2;
            pointer-events: none;
        }

        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

            .lightbox.active {
                display: flex;
            }

            /* Normalmodus: Bild mit Rand */
            .lightbox img {
                max-width: 80%;
                max-height: 80vh;
                border-radius: 12px;
                box-shadow: 0 0 60px rgba(255,255,255,0.1);
                object-fit: contain;
                cursor: zoom-in;
                transition: all 0.3s ease;
            }

            /* VOLLBILD-Modus: Bild füllt ganzen Screen */
            .lightbox.fullscreen-mode img {
                max-width: 100vw;
                max-height: 100vh;
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                object-fit: contain;
                background: black;
                cursor: zoom-out;
            }

            .lightbox video {
                max-width: 85%;
                max-height: 82vh;
                border-radius: 12px;
                box-shadow: 0 0 60px rgba(255,255,255,0.1);
                outline: none;
            }

            .lightbox.fullscreen-mode video {
                max-width: 100vw;
                max-height: 100vh;
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 44px;
            cursor: pointer;
            font-weight: bold;
            line-height: 1;
            z-index: 1001;
        }

            .lightbox-close:hover {
                color: #a8d8ea;
            }

        .lightbox-caption {
            color: white;
            margin-top: 16px;
            font-size: 16px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .lightbox.fullscreen-mode .lightbox-caption {
            opacity: 0;
            pointer-events: none;
        }

        /* PFEILE */
        .lightbox-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 60px;
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 12px;

            z-index: 1000;

            .lightbox-arrow:hover {

            }

            .lightbox-arrow.left {

            }

        /* BILD COUNTER */

            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 15px;
            opacity: 0.6;
            z-index: 1001;

    <script>
        let currentIndex = 0;
        let currentItems = [];
        let isFullscreen = false;

        function buildItemList() {
            currentItems = [];
            document.querySelectorAll('.gallery-item').forEach(item => {
                if (item.style.display !== 'none') {
                    const isVideo = item.dataset.type === 'video';
                    const mediaEl = isVideo
                        ? item.querySelector('video')
                        : item.querySelector('img');
                    const mediaSrc = mediaEl ? mediaEl.src : '';
                    const caption = isVideo
                        ? 'Video'
                        : (item.querySelector('img') ? item.querySelector('img').alt : '');
                    currentItems.push({
                        src: mediaSrc,
                        caption: caption,
                        type: item.dataset.type || 'image'
                    });
                }
            });
        }

        function openLightbox(src, caption, type) {
            buildItemList();
            currentIndex = currentItems.findIndex(item =>
                item.src.includes(src.split('/').pop())
            );
            if (currentIndex === -1) currentIndex = 0;
            isFullscreen = false;
            document.getElementById('lightbox').classList.remove('fullscreen-mode');
            showImage(currentIndex);
            document.getElementById('lightbox').classList.add('active');
        }

        function showImage(index) {
            if (index < 0) index = currentItems.length - 1;
            if (index >= currentItems.length) index = 0;
            currentIndex = index;

            const item = currentItems[index];
            const imgEl = document.getElementById('lightbox-img');
            const videoEl = document.getElementById('lightbox-video');

            videoEl.pause();
            videoEl.src = '';

            if (item.type === 'video') {
                imgEl.style.display = 'none';
                videoEl.style.display = 'block';
                videoEl.src = item.src;
                videoEl.load();
            } else {
                videoEl.style.display = 'none';
                imgEl.style.display = 'block';
                imgEl.src = item.src;
                imgEl.alt = item.caption;
            }

            document.getElementById('lightbox-caption').textContent = item.caption;
            document.getElementById('lightbox-counter').textContent =
                (currentIndex + 1) + ' / ' + currentItems.length;
        }

        function changeImage(direction) {
            // Vollbild beim Wechseln zurücksetzen
            if (isFullscreen) {
                isFullscreen = false;
                document.getElementById('lightbox').classList.remove('fullscreen-mode');
            }
            showImage(currentIndex + direction);
        }

        function closeLightbox() {
            const videoEl = document.getElementById('lightbox-video');
            videoEl.pause();
            videoEl.src = '';
            isFullscreen = false;
            document.getElementById('lightbox').classList.remove('fullscreen-mode');
            if (document.fullscreenElement) document.exitFullscreen();
            document.getElementById('lightbox').classList.remove('active');
        }

        function toggleFullscreen() {
            const lb = document.getElementById('lightbox');
            const videoEl = document.getElementById('lightbox-video');

            // Für Videos: echtes Browser-Vollbild
            if (currentItems[currentIndex]?.type === 'video') {
                if (videoEl.requestFullscreen) videoEl.requestFullscreen();
                return;
            }

            // Für Bilder: CSS-Vollbild (kein schwarzer Rand mehr)
            isFullscreen = !isFullscreen;
            if (isFullscreen) {
                lb.classList.add('fullscreen-mode');
            } else {
                lb.classList.remove('fullscreen-mode');
            }
        }

        // Klick auf Bild = Vollbild toggeln
        document.getElementById('lightbox-img').addEventListener('click', function (e) {
            e.stopPropagation();
            toggleFullscreen();
        });

        // Klick auf Hintergrund = schließen
        document.getElementById('lightbox').addEventListener('click', function (e) {
            if (e.target === this) closeLightbox();
        });

        document.addEventListener('keydown', function (e) {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.key === 'ArrowRight') changeImage(1);
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'Escape') {
                if (isFullscreen) {
                    isFullscreen = false;
                    lb.classList.remove('fullscreen-mode');
                } else {
                    closeLightbox();
                }
            }
            if (e.key === 'f' || e.key === 'F') toggleFullscreen();
        });

        function filterGallery(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.gallery-item').forEach(item => {
                if (cat === 'all' || item.dataset.cat === cat) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }
    </script>
